            Items: |-
              =Filter(
                  ITCM,
                  (IsBlank(varFiltroID) || ID = Value(varFiltroID)),
                  (IsBlank(varFiltroUser) || StartsWith(Nombre, varFiltroUser)),
                  (IsBlank(varFiltroEstado) || varFiltroEstado = "Estado" || Estado.Value = varFiltroEstado),
                  (IsBlank(varFiltroCat) || varFiltroCat = "Categoría" || Categoria.Value = varFiltroCat),
                  (IsBlank(varFiltroFecha) || ('Fecha/Hora' >= varFiltroFecha && 'Fecha/Hora' < DateAdd(varFiltroFecha, 1, TimeUnit.Days)))
