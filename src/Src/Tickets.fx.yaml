            Color: |-
                =Switch(
                
                    ThisItem.Estado.Value,
                
                    "Registrado", RGBA(0, 56, 100, 1),
                
                    "Por Aprobacion", RGBA(130, 70, 0, 1),
                
                    "En Proceso", RGBA(100, 75, 0, 1),
                
                    "Solucionado", RGBA(40, 70, 10, 1),
                
                    "Cancelado", RGBA(180, 0, 0, 1), 
                
                    RGBA(60, 60, 60, 1)
                
