                    ThisItem.Estado.Value,
                
                    "Registrado", RGBA(210,228,242,1),
                
                    "Por Aprobacion", RGBA(255, 230, 200, 1),
                
                    "En Proceso", RGBA(255, 243, 180, 1),
                
                    "Solucionado", RGBA(220, 240, 195, 1),
                
                    "Cancelado", RGBA(255, 210, 210, 1),
                
                    RGBA(220, 220, 220, 1)
                
