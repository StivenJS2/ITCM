    "GalleryTickets As gallery.'BrowseLayout_Vertical_TwoTextOneImageVariant_ver5.0'":
        BorderColor: =RGBA(245, 245, 245, 1)
        DelayItemLoading: =true
        Height: =460
        Items: |-
            =Filter(
                ITCM,
                (IsBlank(varFiltroID_T) || ID = Value(varFiltroID_T)),
                (IsBlank(varFiltroUser_T) || StartsWith(Nombre, varFiltroUser_T)),
                (IsBlank(varFiltroTipo_T) || varFiltroTipo_T = "Tipo" || TipoIR.Value = varFiltroTipo_T),
                (IsBlank(varFiltroCat_T) || varFiltroCat_T = "Categoría" || Categoria.Value = varFiltroCat_T)
            )
        Layout: =Layout.Vertical
        TemplateFill: =RGBA(255, 255, 255, 1)
        TemplatePadding: =0
        TemplateSize: =88
        Width: =1306
        X: =30
        Y: =245
        ZIndex: =25

