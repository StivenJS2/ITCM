        BtnEstado_T As button:
            BorderThickness: =0
            Color: |-
                =Switch(
                
                    ThisItem.Estado.Value,
                
                    "Registrado", RGBA(0, 56, 100, 1),
                
                    "Por Aprobacion", RGBA(130, 70, 0, 1),
                
                    "En Proceso", RGBA(100, 75, 0, 1),
                
                    "Solucionado", RGBA(40, 70, 10, 1),
                
                    "Cancelado", RGBA(180, 0, 0, 1), 
                
                    RGBA(60, 60, 60, 1)
                
                )
            Fill: |-
                =Switch(
                
                    ThisItem.Estado.Value,
                
                    "Registrado", RGBA(210,228,242,1),
                
                    "Por Aprobacion", RGBA(255, 230, 200, 1),
                
                    "En Proceso", RGBA(255, 243, 180, 1),
                
                    "Solucionado", RGBA(220, 240, 195, 1),
                
                    "Cancelado", RGBA(255, 210, 210, 1),
                
                    RGBA(220, 220, 220, 1)
                
