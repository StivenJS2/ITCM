# Gestion

## Management Screen - Request Management

### Filter Section
* ID Case filter (text input)
* Case Number filter (text input)
* User filter (text input)
* Status dropdown: All, Pending, In Progress, Resolved
* Category dropdown: All, Software, Hardware, Access
* Date filter (date picker)

### Data Table
* Columns:
  - STATUS (with color-coded chips)
  - CATEGORY
  - CASE INFORMATION (case ID and title)
  - DETAILS (brief description)
  - REGISTRATION DATE
  - ACTION (Details button)

* Table Header:
  - Background color: #f3f5f7
  - Text color: #808080
  - Font weight: Bold
  - Font size: 9px

* Table Rows:
  - Row 1: Pending | Incident | Connectivity issue | Network down since 8am | 15 Apr 2026
  - Row 2: In Progress | Software | Application error | Reporting system offline | 14 Apr 2026
  - Row 3: Resolved | Hardware | Printer malfunction | Printer fixed | 13 Apr 2026

### Styling
* Status chips use color coding:
  - Pending: Orange (#FF9900)
  - In Progress: Blue (#0086D0)
  - Resolved: Green (#8DC63F)
* Responsive table layout
* Alternating row colors for better readability