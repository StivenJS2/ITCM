Tickets:
  title: "Tickets Administration"
  filters:
    - name: "Tipo"
      options: ["Bug", "Feature", "Improvement"]
    - name: "Categoría"
      options: ["UI", "Backend", "Performance"]
    - name: "Estado"
      options: ["Abierto", "En Progreso", "Cerrado"]
  data_table:
    columns:
      - name: "Tipo"
        type: "string"
      - name: "Categoría"
        type: "string"
      - name: "Estado"
        type: "string"
      - name: "Usuario"
        type: "string"
      - name: "Agente Asignado"
        type: "string"
      - name: "Fecha"
        type: "date"
      - name: "Acciones"
        type: "action"

    rows:
      - Tipo: "Bug"
        Categoría: "UI"
        Estado: "Abierto"
        Usuario: "usuario1"
        Agente Asignado: "agente1"
        Fecha: "2026-04-20"
        Acciones: ["Ver", "Editar", "Cerrar"]
      - Tipo: "Feature"
        Categoría: "Backend"
        Estado: "En Progreso"
        Usuario: "usuario2"
        Agente Asignado: "agente2"
        Fecha: "2026-04-21"
        Acciones: ["Ver", "Editar"]
      - Tipo: "Improvement"
        Categoría: "Performance"
        Estado: "Cerrado"
        Usuario: "usuario3"
        Agente Asignado: "agente3"
        Fecha: "2026-04-19"
        Acciones: ["Ver"]
